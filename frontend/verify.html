<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Verify Email – Cartora</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .otp-box {
      width: 52px; height: 60px;
      text-align: center; font-size: 26px; font-weight: 700;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--white); color: var(--dark); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Playfair Display', serif;
    }
    .otp-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(199,107,57,0.12);
    }
    .otp-box.filled { border-color: var(--gold); }
    .otp-box.error  { border-color: #e74c3c; animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
  </style>
</head>
<body>
<div id="toast"></div>

<div class="auth-page">
  <div class="auth-left">
    <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=900&q=80" alt="Fashion">
    <div class="auth-left-overlay">
      <h2>Check your inbox</h2>
      <p>We sent a 6-digit code to your email. Enter it below to activate your Cartora account.</p>
    </div>
  </div>

  <div class="auth-right">
    <a href="index.html" class="auth-logo">Cart<span>ora</span></a>

    <h1 class="auth-title">Verify Email</h1>

    <!-- Show which email the code was sent to -->
    <div style="background:var(--bg2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:24px;font-size:14px;color:var(--dark);display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">📧</span>
      <span>Code sent to <strong id="email-display"></strong></span>
    </div>

    <p style="font-size:14px;color:var(--mid);margin-bottom:28px">
      Enter the 6-digit code below. It expires in 15 minutes.
    </p>

    <form id="verify-form">
      <!-- 6 OTP boxes -->
      <div style="display:flex;gap:10px;justify-content:center;margin-bottom:8px">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      </div>

      <div class="error-msg" id="otp-err" style="text-align:center;margin-bottom:20px;min-height:18px"></div>

      <button type="submit" class="btn btn-primary btn-full" id="verify-btn">
        <span id="btn-text">Verify Email</span>
        <div class="spinner" id="spinner" style="display:none"></div>
      </button>
    </form>

    <!-- Resend section with countdown -->
    <div style="text-align:center;margin-top:28px;font-size:14px;color:var(--mid)">
      <span id="timer-msg">Didn't receive it? Resend in <strong id="countdown">2:00</strong></span>
      <button id="resend-btn" style="display:none;color:var(--accent);font-size:14px;font-weight:600;background:none;border:none;cursor:pointer">
        Resend Code
      </button>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--light)">
      Wrong email? <a href="signup.html" style="color:var(--accent)">Go back to signup</a>
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
// Get email from URL
const email = decodeURIComponent(new URLSearchParams(location.search).get('email') || '');
if (!email) {
  // No email in URL, redirect back
  window.location.href = 'signup.html';
}

document.getElementById('email-display').textContent = email;

const boxes = document.querySelectorAll('.otp-box');

// ── OTP box behaviour ─────────────────────────

boxes.forEach((box, i) => {
  // Only allow digits
  box.addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '');
    if (this.value) {
      this.classList.add('filled');
      this.classList.remove('error');
      // Auto-advance to next box
      if (i < boxes.length - 1) boxes[i + 1].focus();
    } else {
      this.classList.remove('filled');
    }
  });

  // Backspace goes to previous box
  box.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) {
      boxes[i - 1].focus();
      boxes[i - 1].value = '';
      boxes[i - 1].classList.remove('filled');
    }
    // Submit on Enter if all filled
    if (e.key === 'Enter') {
      document.getElementById('verify-form').dispatchEvent(new Event('submit'));
    }
  });

  // Handle paste of full 6-digit code
  box.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
    [...pasted].forEach((ch, j) => {
      if (boxes[j]) {
        boxes[j].value = ch;
        boxes[j].classList.add('filled');
        boxes[j].classList.remove('error');
      }
    });
    // Focus last filled box or next empty
    const nextEmpty = Math.min(pasted.length, boxes.length - 1);
    boxes[nextEmpty].focus();
  });
});

// Focus first box on load
boxes[0].focus();

// Get full OTP string
function getOTP() {
  return [...boxes].map(b => b.value).join('');
}

// Mark all boxes as error (shake animation)
function markError() {
  boxes.forEach(b => {
    b.classList.add('error');
    b.classList.remove('filled');
    setTimeout(() => b.classList.remove('error'), 400);
  });
  // Clear values and focus first
  boxes.forEach(b => b.value = '');
  boxes[0].focus();
}

// ── Form submit ───────────────────────────────
document.getElementById('verify-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const otp = getOTP();
  document.getElementById('otp-err').textContent = '';

  if (otp.length < 6) {
    document.getElementById('otp-err').textContent = 'Please enter all 6 digits';
    return;
  }

  document.getElementById('btn-text').textContent  = 'Verifying…';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('verify-btn').disabled   = true;

  try {
    const res = await apiFetch('/auth/verify', {
      method: 'POST',
      body:   JSON.stringify({ email, token: otp })
    });

    // Verification success — save auth and redirect
    Auth.set(res.user, res.token);
    showToast('Email verified! Welcome to Cartora 🎉');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

  } catch (err) {
    document.getElementById('otp-err').textContent   = err.message;
    document.getElementById('btn-text').textContent  = 'Verify Email';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('verify-btn').disabled   = false;
    markError();
  }
});

// ── Countdown timer ───────────────────────────
let seconds = 120; // 2 minutes

function startTimer() {
  document.getElementById('timer-msg').style.display  = 'inline';
  document.getElementById('resend-btn').style.display = 'none';

  const timer = setInterval(() => {
    seconds--;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('countdown').textContent = m + ':' + String(s).padStart(2, '0');

    if (seconds <= 0) {
      clearInterval(timer);
      document.getElementById('timer-msg').style.display  = 'none';
      document.getElementById('resend-btn').style.display = 'inline';
    }
  }, 1000);
}

startTimer();

// ── Resend OTP ────────────────────────────────
document.getElementById('resend-btn').addEventListener('click', async function() {
  this.disabled    = true;
  this.textContent = 'Sending…';

  try {
    await apiFetch('/auth/resend', {
      method: 'POST',
      body:   JSON.stringify({ email })
    });
    showToast('New code sent! Check your inbox 📧');

    // Reset timer
    seconds = 120;
    startTimer();
    this.textContent = 'Resend Code';

    // Clear boxes
    boxes.forEach(b => { b.value = ''; b.classList.remove('filled','error'); });
    boxes[0].focus();

  } catch (err) {
    showToast(err.message, 'error');
    this.disabled    = false;
    this.textContent = 'Resend Code';
  }
});
</script>
</body>
</html>
